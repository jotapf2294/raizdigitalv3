<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horta Offline</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>

    <header id="lunar-header">
        <div class="header-content">
            <h1 id="moon-emoji">🌑</h1>
            <div>
                <h2 id="moon-phase">Carregando Lua...</h2>
                <small id="moon-tip">Dica do dia...</small>
            </div>
        </div>
    </header>

    <main id="app-content">
        <section id="home" class="page active">
            <div class="grid">
                <button onclick="navigate('zonas')" class="card">🗺️ <span>Zonas</span></button>
                <button onclick="navigate('wiki')" class="card">📖 <span>Wiki</span></button>
                <button onclick="navigate('notas')" class="card">📓 <span>Notas</span></button>
                <button onclick="navigate('colheitas')" class="card">🧺 <span>Colheitas</span></button>
            </div>
        </section>

        <section id="zonas" class="page">
            <header class="page-header">
                <button onclick="navigate('home')">⬅️</button>
                <h2>Minhas Zonas</h2>
            </header>
            <div id="lista-zonas"></div>
            <button class="fab" onclick="addZona()">+</button>
        </section>

        </main>

    <nav class="bottom-nav">
        <button onclick="navigate('home')">🏠</button>
        <button onclick="navigate('zonas')">🌿</button>
        <button onclick="navigate('wiki')">📖</button>
        <button onclick="navigate('notas')">📓</button>
    </nav>

    <script src="js/db.js"></script>
    <script src="js/lunar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
