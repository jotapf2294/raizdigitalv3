<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Códice do Jota</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7C2D12" />

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>

  <div id="app">

    <aside class="sidebar">

      <h1 class="logo">Códice do Jota</h1>

      <nav class="menu">
        <button data-route="/">🏛️ Pórtico</button>
        <button data-route="/talhoes">🌱 Talhões</button>
        <button data-route="/herbario">🌿 Herbário</button>
        <button data-route="/notas">📜 Arquivo</button>
        <button data-route="/instrumentos">🧪 Instrumentos</button>
      </nav>

      <button id="themeToggle" class="theme-btn">🌙 Alternar Tema</button>

    </aside>

    <main id="view"></main>

  </div>

  <script type="module" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>
</html>
