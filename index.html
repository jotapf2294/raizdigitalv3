<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Fórum Privado</title>
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
  <style>
    :root {
      --bg: #FFF8F0; --card: #FFFFFF; --text: #5C4033; 
      --primary: #E8B4B8; --border: #E5DDD5; --accent: #D4A574;
    }
    [data-theme="dark"] {
      --bg: #2C2419; --card: #3D3226; --text: #FFF8F0; --border: #5C4033;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
    input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); margin-bottom: 10px; }
    textarea { height: 100px; resize: vertical; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: 600; }
    .btn-sm { padding: 5px 10px; font-size: 0.85rem; }
    .post { border-left: 3px solid var(--primary); }
    .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .post-title { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
    .post-meta { font-size: 0.8rem; opacity: 0.7; }
    .post-content { white-space: pre-wrap; line-height: 1.6; }
    .post-actions { margin-top: 10px; display: flex; gap: 8px; }
    .comentario { margin-left: 20px; margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 8px; }
    #theme-toggle { cursor: pointer; font-size: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍰 Meu Fórum Babe</h1>
      <span id="theme-toggle">🌙</span>
    </header>

    <div class="card">
      <h3>Novo Tópico</h3>
      <input type="text" id="titulo" placeholder="Título do tópico">
      <textarea id="conteudo" placeholder="Escreve aqui... Markdown básico: **negrito**, *itálico*"></textarea>
      <button class="btn" onclick="criarPost()">Publicar</button>
    </div>

    <div id="posts"></div>
  </div>

  <script>
    const db = new Dexie('MeuForumDB');
    db.version(1).stores({
      posts: '++id, titulo, conteudo, data, comentarios'
    });

    // Theme
    const themeToggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'dark'? '☀️' : '🌙';
    themeToggle.onclick = () => {
      const theme = document.documentElement.getAttribute('data-theme') === 'dark'? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      themeToggle.textContent = theme === 'dark'? '☀️' : '🌙';
    };

    async function criarPost() {
      const titulo = document.getElementById('titulo').value;
      const conteudo = document.getElementById('conteudo').value;
      if (!titulo || !conteudo) return alert('Preenche título e conteúdo');
      
      await db.posts.add({
        titulo, conteudo, 
        data: new Date().toISOString(),
        comentarios: []
      });
      
      document.getElementById('titulo').value = '';
      document.getElementById('conteudo').value = '';
      renderPosts();
    }

    async function renderPosts() {
      const posts = await db.posts.reverse().toArray();
      document.getElementById('posts').innerHTML = posts.map(p => `
        <div class="card post">
          <div class="post-header">
            <div class="post-title">${p.titulo}</div>
            <div class="post-meta">${new Date(p.data).toLocaleString('pt-PT')}</div>
          </div>
          <div class="post-content">${formatarMarkdown(p.conteudo)}</div>
          <div class="post-actions">
            <button class="btn btn-sm" onclick="toggleComentario('${p.id}')">💬 Comentar</button>
            <button class="btn btn-sm" onclick="apagarPost('${p.id}')" style="background:#C44536;">🗑️</button>
          </div>
          <div id="com-${p.id}" style="display:none; margin-top:10px;">
            <input type="text" id="input-com-${p.id}" placeholder="Escreve um comentário...">
            <button class="btn btn-sm" onclick="addComentario('${p.id}')">Enviar</button>
          </div>
          ${(p.comentarios || []).map(c => `
            <div class="comentario">
              <div class="post-meta">${new Date(c.data).toLocaleString('pt-PT')}</div>
              <div>${formatarMarkdown(c.texto)}</div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function formatarMarkdown(texto) {
      return texto
        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
        .replace(/\*(.*?)\*/g, '<i>$1</i>')
        .replace(/\n/g, '<br>');
    }

    function toggleComentario(id) {
      const div = document.getElementById(`com-${id}`);
      div.style.display = div.style.display === 'none'? 'block' : 'none';
    }

    async function addComentario(postId) {
      const input = document.getElementById(`input-com-${postId}`);
      const texto = input.value;
      if (!texto) return;
      
      const post = await db.posts.get(Number(postId));
      post.comentarios = post.comentarios || [];
      post.comentarios.push({ texto, data: new Date().toISOString() });
      await db.posts.put(post);
      
      input.value = '';
      renderPosts();
    }

    async function apagarPost(id) {
      if (confirm('Apagar tópico?')) {
        await db.posts.delete(Number(id));
        renderPosts();
      }
    }

    renderPosts();
  </script>
</body>
</html>
