<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8B4B8">
  <title>Babe's Bakery Gestão</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/lib/dexie.min.js"></script>
</head>
<body>
  <header>
    <h1>Babe's Bakery <span id="theme-toggle">🌙</span></h1>
    <nav>
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="ingredientes">Ingredientes</button>
      <button class="tab-btn" data-tab="receitas">Receitas</button>
      <button class="tab-btn" data-tab="agenda">Agenda</button>
      <button class="tab-btn" data-tab="config">Config</button>
    </nav>
  </header>

  <main>
    <section id="dashboard" class="tab-content active"></section>
    <section id="ingredientes" class="tab-content"></section>
    <section id="receitas" class="tab-content"></section>
    <section id="agenda" class="tab-content"></section>
    <section id="config" class="tab-content"></section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
